services:
  smartsurf-db:
    image: mysql:8.0
    container_name: smartsurf-traccar-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: traccar
      MYSQL_USER: traccar
      MYSQL_PASSWORD: ${TRACCAR_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${TRACCAR_DB_ROOT_PASSWORD}
    volumes:
      - ./mysql:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "traccar", "-p${TRACCAR_DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - smartsurf-traccar-net

  smartsurf-traccar:
    build:
      context: .
      dockerfile: Dockerfile
    image: smartsurf-traccar:6.13.3-smartsurf
    container_name: smartsurf-traccar
    restart: unless-stopped
    depends_on:
      smartsurf-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8082:8082"
      - "5055:5055"
    volumes:
      - ./logs:/opt/traccar/logs:rw
      - ./data:/opt/traccar/data:rw
      - ./traccar.xml:/opt/traccar/conf/traccar.xml:ro
    networks:
      - smartsurf-traccar-net

networks:
  smartsurf-traccar-net:
    name: smartsurf-traccar-net
